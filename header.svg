<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Main dark background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="45%"  stop-color="#001824"/>
      <stop offset="100%" stop-color="#003d52"/>
    </linearGradient>

    <!-- Radial highlight in center (adds depth) -->
    <radialGradient id="centerLight" cx="47%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#003d52" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Strong neon glow for cube lines -->
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="7" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title glow -->
    <filter id="titleGlow" x="-8%" y="-50%" width="116%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip"><rect width="900" height="280"/></clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>
  <rect width="900" height="280" fill="url(#centerLight)"/>

  <!-- ── GRID (very faint depth lines) ── -->
  <g opacity="0.06" clip-path="url(#clip)">
    <line x1="0"   y1="93"  x2="900" y2="93"  stroke="#22d3ee" stroke-width="1"/>
    <line x1="0"   y1="140" x2="900" y2="140" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0"   y1="187" x2="900" y2="187" stroke="#22d3ee" stroke-width="1"/>
    <line x1="225" y1="0"   x2="225" y2="280" stroke="#22d3ee" stroke-width="1"/>
    <line x1="450" y1="0"   x2="450" y2="280" stroke="#22d3ee" stroke-width="1"/>
    <line x1="675" y1="0"   x2="675" y2="280" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- ════════════════════════════════════════════
       WIREFRAME CUBE — RIGHT SIDE — centred (730,138)
       Pure line elements, ZERO fills → no wedge artifacts.
       12 edges: 4 front, 4 back, 4 depth connectors.
       Front half-size=85, back offset (+35,-35).
  ════════════════════════════════════════════ -->
  <g transform="translate(730,138)" opacity="0.80" filter="url(#neonGlow)" clip-path="url(#clip)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="360"
      dur="11s"
      repeatCount="indefinite"/>

    <!-- FRONT FACE — 4 edges (bright cyan) -->
    <line x1="-85" y1="-85" x2=" 85" y2="-85" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>
    <line x1=" 85" y1="-85" x2=" 85" y2=" 85" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>
    <line x1=" 85" y1=" 85" x2="-85" y2=" 85" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-85" y1=" 85" x2="-85" y2="-85" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>

    <!-- BACK FACE — 4 edges (dimmer teal) -->
    <line x1="-50" y1="-120" x2="120" y2="-120" stroke="#0e7490" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="120" y1="-120" x2="120" y2="  50" stroke="#0e7490" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="120" y1="  50" x2="-50" y2="  50" stroke="#0e7490" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-50" y1="  50" x2="-50" y2="-120" stroke="#0e7490" stroke-width="1.6" stroke-linecap="round"/>

    <!-- DEPTH EDGES — connecting front to back (medium brightness) -->
    <line x1="-85" y1="-85" x2="-50" y2="-120" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    <line x1=" 85" y1="-85" x2="120" y2="-120" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    <line x1=" 85" y1=" 85" x2="120" y2="  50" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-85" y1=" 85" x2="-50" y2="  50" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>

    <!-- VERTEX DOTS — front corners -->
    <circle cx="-85" cy="-85" r="4" fill="#67e8f9"/>
    <circle cx=" 85" cy="-85" r="4" fill="#67e8f9"/>
    <circle cx=" 85" cy=" 85" r="4" fill="#67e8f9"/>
    <circle cx="-85" cy=" 85" r="4" fill="#67e8f9"/>

    <!-- VERTEX DOTS — back corners -->
    <circle cx="-50" cy="-120" r="3" fill="#0e7490"/>
    <circle cx="120" cy="-120" r="3" fill="#0e7490"/>
    <circle cx="120" cy="  50" r="3" fill="#0e7490"/>
    <circle cx="-50" cy="  50" r="3" fill="#0e7490"/>
  </g>

  <!-- SMALL ACCENT CUBE — top-left, counter-spin -->
  <g transform="translate(120,80)" opacity="0.35" filter="url(#neonGlow)" clip-path="url(#clip)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="-360"
      dur="18s"
      repeatCount="indefinite"/>

    <!-- front -->
    <line x1="-32" y1="-32" x2=" 32" y2="-32" stroke="#22d3ee" stroke-width="1.4"/>
    <line x1=" 32" y1="-32" x2=" 32" y2=" 32" stroke="#22d3ee" stroke-width="1.4"/>
    <line x1=" 32" y1=" 32" x2="-32" y2=" 32" stroke="#22d3ee" stroke-width="1.4"/>
    <line x1="-32" y1=" 32" x2="-32" y2="-32" stroke="#22d3ee" stroke-width="1.4"/>
    <!-- back -->
    <line x1="-18" y1="-46" x2=" 46" y2="-46" stroke="#0e7490" stroke-width="1"/>
    <line x1=" 46" y1="-46" x2=" 46" y2=" 18" stroke="#0e7490" stroke-width="1"/>
    <line x1=" 46" y1=" 18" x2="-18" y2=" 18" stroke="#0e7490" stroke-width="1"/>
    <line x1="-18" y1=" 18" x2="-18" y2="-46" stroke="#0e7490" stroke-width="1"/>
    <!-- depth -->
    <line x1="-32" y1="-32" x2="-18" y2="-46" stroke="#22d3ee" stroke-width="1"/>
    <line x1=" 32" y1="-32" x2=" 46" y2="-46" stroke="#22d3ee" stroke-width="1"/>
    <line x1=" 32" y1=" 32" x2=" 46" y2=" 18" stroke="#22d3ee" stroke-width="1"/>
    <line x1="-32" y1=" 32" x2="-18" y2=" 18" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- ── BORDER LINES ── -->
  <line x1="0" y1="2"   x2="900" y2="2"   stroke="#00d4e8" stroke-width="2.5" opacity="0.5"/>
  <line x1="0" y1="278" x2="900" y2="278" stroke="#00d4e8" stroke-width="2.5" opacity="0.5"/>

  <!-- ── MAIN TITLE — rendered LAST so always on top ── -->
  <text
    x="420" y="148"
    text-anchor="middle"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="98"
    letter-spacing="2"
    fill="#ffffff"
    stroke="#00d4e8"
    stroke-width="2.5"
    filter="url(#titleGlow)"
    paint-order="stroke fill">
    AMAN AMARJIT
  </text>

  <!-- ── SUBTITLE ── -->
  <text
    x="420" y="194"
    text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="17"
    letter-spacing="3"
    fill="#67e8f9"
    opacity="0.85">
    AI Engineer  ·  Systems Builder  ·  Security Researcher
  </text>

  <!-- ── BOTTOM BRAND TAG ── -->
  <text
    x="420" y="248"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="11"
    font-weight="400"
    fill="#0e7490"
    letter-spacing="5"
    opacity="0.7">
    ◈   RESHAPE THE ALGORITHM   ◈
  </text>

  <!-- Pulsing accent line -->
  <rect x="280" y="257" width="280" height="1.5" fill="#00d4e8" rx="1">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width"   values="280;340;280"  dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x"       values="280;250;280"  dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
